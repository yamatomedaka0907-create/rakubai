<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ shop.shop_name }} 確認コード入力</title>
  <style>
    :root { color-scheme: light; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Hiragino Sans", "Yu Gothic", sans-serif;
      background: linear-gradient(180deg, #f7faf9 0%, #edf6f4 100%);
      color: #1f2937;
    }
    .wrap {
      max-width: 640px;
      margin: 0 auto;
      padding: 24px 16px 48px;
    }
    .top-nav {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }
    .top-nav a {
      color: #0f766e;
      text-decoration: none;
      font-weight: 700;
    }
    .card {
      background: #fff;
      border-radius: 24px;
      padding: 28px;
      box-shadow: 0 18px 50px rgba(15, 118, 110, 0.12);
      border: 1px solid rgba(15, 118, 110, 0.08);
    }
    .badge {
      display: inline-flex;
      align-items: center;
      padding: 6px 12px;
      border-radius: 999px;
      background: #ccfbf1;
      color: #115e59;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.08em;
      margin-bottom: 14px;
    }
    h1 {
      margin: 0 0 12px;
      font-size: 30px;
      line-height: 1.3;
    }
    .lead {
      margin: 0 0 20px;
      line-height: 1.8;
      color: #4b5563;
    }
    .email-box {
      margin-bottom: 20px;
      padding: 14px 16px;
      border-radius: 14px;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      color: #334155;
      line-height: 1.7;
    }
    .alert {
      margin-bottom: 18px;
      padding: 14px 16px;
      border-radius: 14px;
      background: #fef2f2;
      color: #b91c1c;
      border: 1px solid #fecaca;
      font-weight: 700;
    }
    form {
      display: grid;
      gap: 16px;
    }
    .label {
      display: grid;
      gap: 8px;
      font-weight: 700;
      color: #111827;
    }
    .input {
      width: 100%;
      border: 1px solid #d1d5db;
      border-radius: 14px;
      padding: 14px 16px;
      font-size: 24px;
      letter-spacing: 0.35em;
      text-align: center;
      outline: none;
      transition: border-color .2s ease, box-shadow .2s ease;
      background: #fff;
    }
    .input:focus {
      border-color: #14b8a6;
      box-shadow: 0 0 0 4px rgba(20, 184, 166, 0.15);
    }
    .hint {
      font-size: 13px;
      line-height: 1.6;
      color: #6b7280;
      font-weight: 500;
      margin-top: -2px;
    }
    .submit {
      border: none;
      border-radius: 16px;
      padding: 15px 18px;
      background: linear-gradient(135deg, #14b8a6, #0f766e);
      color: #fff;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
    }
    .submit:hover {
      filter: brightness(1.03);
    }
    .note {
      margin-top: 18px;
      padding: 16px 18px;
      border-radius: 16px;
      background: #f8fafc;
      color: #475569;
      line-height: 1.8;
      border: 1px solid #e2e8f0;
    }
    @media (max-width: 640px) {
      .card {
        padding: 22px 18px;
        border-radius: 20px;
      }
      h1 {
        font-size: 25px;
      }
      .input {
        font-size: 22px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <nav class="top-nav">
      <a href="/member/{{ shop_id }}/register?next={{ next_url|urlencode }}">会員登録に戻る</a>
      <a href="/member/{{ shop_id }}/login?next={{ next_url|urlencode }}">会員ログイン</a>
    </nav>
    <div class="card">
      <div class="badge">メール認証</div>
      <h1>{{ shop.shop_name }} の確認コード入力</h1>
      <p class="lead">登録メールアドレスに送信した6桁の確認コードを入力してください。コードが一致すると会員登録が完了します。</p>
      <div class="email-box">
        送信先メールアドレス：<strong>{{ pending_email }}</strong>
      </div>
      {% if error %}
        <div class="alert">{{ error }}</div>
      {% endif %}
      <form method="post" action="/member/{{ shop_id }}/register/verify">
        <input type="hidden" name="token" value="{{ token }}">
        <input type="hidden" name="next_url" value="{{ next_url }}">
        <label class="label">
          確認コード
          <input class="input" type="text" name="code" inputmode="numeric" pattern="[0-9]{6}" maxlength="6" placeholder="123456" required>
          <span class="hint">有効期限は10分です。半角数字6桁で入力してください。</span>
        </label>
        <button class="submit" type="submit">会員登録を完了する</button>
      </form>
      <div class="note">メールが届かない場合は迷惑メールフォルダも確認してください。コードの有効期限が切れた場合は会員登録画面からもう一度やり直してください。</div>
    </div>
  </div>
</body>
</html>
