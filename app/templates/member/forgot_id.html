<!DOCTYPE html>
<html lang="ja"><head><meta charset="UTF-8"><title>会員ログインID確認</title><meta name="viewport" content="width=device-width, initial-scale=1.0"><script src="https://cdn.tailwindcss.com"></script></head><body class="bg-gray-100"><div class="min-h-screen flex items-center justify-center p-4"><div class="bg-white p-8 rounded-2xl shadow-md w-full max-w-md"><div class="text-center mb-6"><h1 class="text-2xl font-bold text-teal-600">会員ログインID確認</h1><p class="text-sm text-gray-500 mt-2">店舗IDと登録メールアドレスを入力してください。</p></div><form method="POST" class="space-y-4"><div><label class="block text-sm font-medium text-gray-700">店舗ID</label><input type="text" name="shop_id" value="{{ shop_id or '' }}" required class="mt-1 block w-full border-gray-300 rounded-md shadow-sm"></div><div><label class="block text-sm font-medium text-gray-700">登録メールアドレス</label><input type="email" name="email" value="{{ email or '' }}" required class="mt-1 block w-full border-gray-300 rounded-md shadow-sm"></div><button type="submit" class="w-full bg-teal-500 text-white py-2 rounded-md hover:bg-teal-600">確認する</button></form>{% if error_message %}<div class="mt-4 text-sm text-red-600">{{ error_message }}</div>{% endif %}{% if login_id %}<div class="mt-4 p-3 rounded bg-teal-50 text-teal-700 text-sm">あなたのログインID（電話番号）: {{ login_id }}</div>{% endif %}</div></div></body></html>
