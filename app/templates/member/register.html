<!doctype html>
<html lang="ja">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>{{ shop.shop_name }} | 会員登録</title><style>:root { --primary: {{ shop.primary_color }}; --primary-dark: {{ shop.primary_dark }}; --bg-soft: {{ shop.accent_bg }}; --line: #d8efec; --text:#1f2937; --subtext:#6b7280; --shadow:0 8px 24px rgba(15,23,42,.06);}*{box-sizing:border-box} body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:linear-gradient(180deg,#fff 0%,var(--bg-soft) 100%);color:var(--text)} .wrap{max-width:760px;margin:0 auto;padding:24px}.top-nav{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px}.top-nav a{display:inline-flex;align-items:center;justify-content:center;min-height:42px;padding:0 14px;border-radius:999px;background:#fff;border:1px solid var(--line);text-decoration:none;font-weight:700;color:var(--primary-dark)} .card{background:#fff;border:1px solid var(--line);border-radius:24px;box-shadow:var(--shadow);padding:28px}.badge{display:inline-flex;padding:8px 12px;border-radius:999px;background:rgba(46,196,182,.14);color:var(--primary-dark);font-weight:800;font-size:13px;margin-bottom:14px} h1{margin:0 0 10px;color:var(--primary-dark)} .lead{margin:0 0 22px;color:var(--subtext);line-height:1.8}.grid{display:grid;gap:14px}.label{display:grid;gap:8px;font-size:14px;font-weight:700}.input{width:100%;min-height:46px;padding:0 14px;border:1px solid var(--line);border-radius:12px;font-size:15px;background:#fff}.submit{width:100%;min-height:48px;border:none;border-radius:12px;background:var(--primary);color:#fff;font-size:15px;font-weight:800;cursor:pointer}.note{margin-top:14px;padding:14px 16px;border-radius:16px;background:#fcfffe;border:1px solid var(--line);color:var(--subtext);line-height:1.8}.alert{margin-bottom:16px;padding:12px 14px;border-radius:14px;background:#fff4f4;border:1px solid #f7c9c9;color:#b42318}@media(max-width:640px){.wrap{padding:16px}.card{padding:20px;border-radius:20px}.top-nav a{width:100%}}</style></head>
<body><div class="wrap"><nav class="top-nav"><a href="{{ next_url }}">前のページへ戻る</a><a href="/member/{{ shop_id }}/login?next={{ next_url|urlencode }}">会員ログイン</a></nav><div class="card"><div class="badge">会員登録</div><h1>{{ shop.shop_name }} の会員登録</h1><p class="lead">会員登録をすると、次回予約がスムーズになり、会員ページからチャット欄を使えるようになります。会員登録をしなくても予約は可能です。</p>{% if error %}<div class="alert">{{ error }}</div>{% endif %}<form class="grid" method="post" action="/member/{{ shop_id }}/register"><input type="hidden" name="next_url" value="{{ next_url }}"><label class="label">お名前<input class="input" type="text" name="name" placeholder="山田 花子" required></label><label class="label">電話番号（ログインID）<input class="input" type="text" name="phone" placeholder="09012345678" required></label><label class="label">パスワード<input class="input" type="password" name="password" placeholder="4文字以上" required></label><label class="label">メールアドレス（任意）<input class="input" type="email" name="email" placeholder="example@gmail.com"></label><button class="submit" type="submit">会員登録する</button></form><div class="note">会員登録後はそのままログイン状態になり、会員ページに進めます。メールアドレスを登録すると今後リマインド案内の対象にできます。</div></div></div></body></html>
