
<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>送信元メール設定</title>
  <style>
    :root{--primary:#2ec4b6;--primary-dark:#159a90;--bg:#f7fffe;--line:#d8efec;--text:#1f2937;--sub:#6b7280;--card:#fff;--ok:#166534;--ok-bg:#f0fdf4}
    *{box-sizing:border-box} body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:linear-gradient(180deg,#fff 0%,var(--bg) 100%);color:var(--text);padding:24px}
    .wrap{max-width:960px;margin:0 auto}.top{display:flex;justify-content:space-between;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:18px}.links{display:flex;gap:10px;flex-wrap:wrap}.links a{display:inline-flex;padding:10px 14px;border-radius:999px;border:1px solid var(--line);text-decoration:none;color:var(--primary-dark);font-weight:700;background:#fff}.logout button{padding:10px 14px;border:none;border-radius:999px;background:#e5fffb;color:var(--primary-dark);font-weight:800}.card{background:#fff;border:1px solid var(--line);border-radius:24px;padding:28px;box-shadow:0 12px 32px rgba(15,23,42,.08)}.badge{display:inline-flex;padding:7px 11px;border-radius:999px;background:rgba(46,196,182,.14);color:var(--primary-dark);font-weight:700;font-size:13px;margin-bottom:12px}.msg{margin:0 0 16px;padding:12px 14px;border-radius:12px;font-weight:700}.ok{border:1px solid #bbf7d0;background:var(--ok-bg);color:var(--ok)} label{display:block;font-size:14px;font-weight:700;margin-top:16px} input{width:100%;margin-top:8px;padding:14px;border:1px solid var(--line);border-radius:12px;font:inherit} button{margin-top:20px;min-height:48px;padding:0 18px;border:none;border-radius:12px;background:var(--primary);color:#fff;font-weight:800;font-size:15px} .note{color:var(--sub);line-height:1.8}
  </style>
</head>
<body>
<div class="wrap">
  <div class="top"><div class="links"><a href="/platform/shops">登録店舗管理へ戻る</a><a href="/platform/templates">テンプレート管理</a></div><form class="logout" method="post" action="/platform/logout"><button type="submit">ログアウト</button></form></div>
  {% if message %}<div class="msg ok">{{ message }}</div>{% endif %}
  <div class="card">
    <div class="badge">運営管理者: {{ current_admin_name }}</div>
    <h1>送信元メール設定</h1>
    <p class="note">予約完了メールの送信元として使う共通アドレスを設定します。返信先は各店舗の返信先メールアドレスが使われます。Gmailで使う場合はアプリパスワードを入力してください。</p>
    <form method="post" action="/platform/settings/mail">
      <label>送信元メールアドレス<input type="email" name="from_email" value="{{ settings.from_email }}" placeholder="noreply@example.com" required></label>
      <label>送信者名<input type="text" name="from_name" value="{{ settings.from_name }}" placeholder="予約システム"></label>
      <label>SMTPホスト<input type="text" name="smtp_host" value="{{ settings.smtp_host or 'smtp.gmail.com' }}" required></label>
      <label>SMTPポート<input type="text" name="smtp_port" value="{{ settings.smtp_port or '587' }}" required></label>
      <label>SMTPユーザー名<input type="text" name="smtp_username" value="{{ settings.smtp_username or settings.from_email }}" placeholder="通常は送信元メールアドレス"></label>
      <label>SMTPパスワード / アプリパスワード<input type="password" name="smtp_password" value="{{ settings.smtp_password }}" placeholder="Gmailのアプリパスワード"></label>
      <button type="submit">送信元メール設定を保存する</button>
    </form>
  </div>
</div>
</body>
</html>
