<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>新しいパスワード設定</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
<div class="min-h-screen flex items-center justify-center">
    <div class="bg-white p-8 rounded-2xl shadow-md w-full max-w-md">
        <div class="text-center mb-6">
            <h1 class="text-2xl font-bold text-teal-600">新しいパスワード設定</h1>
        </div>

        {% if error_message %}
        <div class="mb-4 p-3 rounded bg-red-50 text-red-700 text-sm">{{ error_message }}</div>
        {% endif %}

        {% if message %}
        <div class="mb-4 p-3 rounded bg-teal-50 text-teal-700 text-sm">{{ message }}</div>
        {% endif %}

        {% if token %}
        <form method="POST" action="/admin/reset-password" class="space-y-4">
            <input type="hidden" name="token" value="{{ token }}">
            <div>
                <label class="block text-sm font-medium text-gray-700">新しいパスワード</label>
                <input type="password" name="password" required
                       class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-2 focus:ring-teal-400 focus:border-teal-400">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">確認用パスワード</label>
                <input type="password" name="password_confirm" required
                       class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-2 focus:ring-teal-400 focus:border-teal-400">
            </div>
            <button type="submit" class="w-full bg-teal-500 text-white py-2 rounded-md hover:bg-teal-600">
                更新する
            </button>
        </form>
        {% endif %}

        <div class="mt-6 text-center">
            <a href="/store-login" class="text-teal-600 hover:underline">店舗ログインへ戻る</a>
        </div>
    </div>
</div>
</body>
</html>
