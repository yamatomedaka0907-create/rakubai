<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>パスワード再設定</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
<div class="min-h-screen flex items-center justify-center">
    <div class="bg-white p-8 rounded-2xl shadow-md w-full max-w-md">
        <div class="text-center mb-6">
            <h1 class="text-2xl font-bold text-teal-600">パスワード再設定</h1>
            <p class="text-sm text-gray-500">登録時に設定したログインID（店舗ID）と登録メールアドレスを入力してください。</p>
        </div>

        <form method="POST" action="/admin/forgot-password" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700">ログインID（店舗ID）</label>
                <input type="text" name="shop_id" value="{{ shop_id or '' }}" required
                       placeholder="登録したログインID（例: test-shop）"
                       class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-2 focus:ring-teal-400 focus:border-teal-400">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">登録メールアドレス</label>
                <input type="email" name="email" value="{{ email or '' }}" required
                       class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-2 focus:ring-teal-400 focus:border-teal-400">
            </div>
            <button type="submit" class="w-full bg-teal-500 text-white py-2 rounded-md hover:bg-teal-600">
                再設定リンクを発行
            </button>
        </form>

        {% if error_message %}
        <div class="mt-4 text-sm text-red-600">
            {{ error_message }}
        </div>
        {% endif %}

        {% if message %}
        <div class="mt-4 text-sm text-gray-700">
            {{ message }}
        </div>
        {% endif %}

        {% if debug_reset_url %}
        <div class="mt-2 p-3 rounded bg-teal-50 text-teal-700 text-sm break-all">
            開発用リンク:
            <a class="underline" href="{{ debug_reset_url }}">{{ debug_reset_url }}</a>
        </div>
        {% endif %}

        <div class="mt-6 text-center">
            <a href="/store-login" class="text-teal-600 hover:underline">店舗ログインへ戻る</a>
        </div>
    </div>
</div>
</body>
</html>
