<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ログインID確認</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
<div class="min-h-screen flex items-center justify-center">
    <div class="bg-white p-8 rounded-2xl shadow-md w-full max-w-md">
        <div class="text-center mb-6">
            <h1 class="text-2xl font-bold text-teal-600">ログインID確認</h1>
        </div>

        <form method="POST" action="/admin/forgot-id" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700">登録メールアドレス</label>
                <input type="email" name="email" value="{{ email or '' }}" required
                       class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-2 focus:ring-teal-400 focus:border-teal-400">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">登録電話番号</label>
                <input type="text" name="phone" value="{{ phone or '' }}" required
                       class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-2 focus:ring-teal-400 focus:border-teal-400">
            </div>
            <button type="submit" class="w-full bg-teal-500 text-white py-2 rounded-md hover:bg-teal-600">
                確認する
            </button>
        </form>

        {% if error_message %}
        <div class="mt-4 text-sm text-red-600">
            {{ error_message }}
        </div>
        {% endif %}

        {% if message %}
        <div class="mt-4 text-sm text-gray-700">
            {{ message }}
        </div>
        {% endif %}

        {% if login_id %}
        <div class="mt-2 p-3 rounded bg-teal-50 text-teal-700 text-sm">
            あなたのログインID: {{ login_id }}
        </div>
        {% endif %}

        <div class="mt-6 text-center">
            <a href="/store-login" class="text-teal-600 hover:underline">店舗ログインへ戻る</a>
        </div>
    </div>
</div>
</body>
</html>
