<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>新規店舗登録</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
<div class="min-h-screen flex items-center justify-center p-4">
<div class="bg-white p-8 rounded-2xl shadow-md w-full max-w-md">

<h1 class="text-2xl font-bold text-teal-600 mb-2 text-center">新規店舗登録</h1>
<p class="text-sm text-gray-500 text-center mb-6">登録したログインIDが、そのまま店舗IDとして使われます。</p>

{% if error_message %}
<div class="mb-4 rounded-lg border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-700">
    {{ error_message }}
</div>
{% endif %}

<form method="POST" action="/signup" class="space-y-4">

<div>
<label class="block mb-1 text-sm font-medium text-gray-700">店舗名</label>
<input name="shop_name" required value="{{ form.shop_name if form else '' }}" class="w-full border p-2 rounded">
</div>

<div>
<label class="block mb-1 text-sm font-medium text-gray-700">管理者名</label>
<input name="owner_name" required value="{{ form.owner_name if form else '' }}" class="w-full border p-2 rounded">
</div>

<div>
<label class="block mb-1 text-sm font-medium text-gray-700">電話番号</label>
<input name="phone" required value="{{ form.phone if form else '' }}" class="w-full border p-2 rounded">
</div>

<div>
<label class="block mb-1 text-sm font-medium text-gray-700">メールアドレス</label>
<input name="email" type="email" required value="{{ form.email if form else '' }}" class="w-full border p-2 rounded">
</div>

<div>
<label class="block mb-1 text-sm font-medium text-gray-700">ログインID（店舗ID）</label>
<input name="login_id" required value="{{ form.login_id if form else '' }}" class="w-full border p-2 rounded" placeholder="例: test-shop">
<p class="mt-1 text-xs text-gray-500">4文字以上、半角英小文字・数字・ハイフンのみ使えます。</p>
</div>

<div>
<label class="block mb-1 text-sm font-medium text-gray-700">パスワード</label>
<input type="password" name="password" required class="w-full border p-2 rounded">
<p class="mt-1 text-xs text-gray-500">6文字以上で入力してください。</p>
</div>

<div>
<label class="block mb-1 text-sm font-medium text-gray-700">確認用パスワード</label>
<input type="password" name="password_confirm" required class="w-full border p-2 rounded">
</div>

<button class="w-full bg-teal-500 text-white p-2 rounded hover:bg-teal-600">登録</button>
</form>

<div class="mt-6 text-center text-sm">
    <a href="/store-login" class="text-teal-600 hover:underline">店舗ログインへ戻る</a>
</div>

</div>
</div>
</body>
</html>
