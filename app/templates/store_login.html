<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>店舗ログイン</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">

<div class="min-h-screen flex items-center justify-center">
    <div class="bg-white p-8 rounded-2xl shadow-md w-full max-w-md">

        <div class="text-center mb-6">
            <p class="text-sm text-gray-500">店舗ごとの管理画面ログイン</p>
            <h1 class="text-2xl font-bold mt-2 text-teal-600">店舗ログイン</h1>
        </div>

        <p class="text-gray-600 mt-4 text-center">
            ログインID（登録時の店舗ID）とパスワードを入力してログインしてください。
        </p>

        {% if request.query_params.get("registered") %}
        <div class="mt-4 rounded-lg border border-teal-200 bg-teal-50 px-4 py-3 text-sm text-teal-700">
            {{ request.query_params.get("registered") }}
        </div>
        {% endif %}

        {% if error_message %}
        <div class="mt-4 rounded-lg border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-700">
            {{ error_message }}
        </div>
        {% endif %}

        <form method="POST" action="/store-login" class="mt-6 space-y-4">

            <div>
                <label class="block text-sm font-medium text-gray-700">ログインID（店舗ID）</label>
                <input type="text" name="shop_id"
                       placeholder="例: 09012345678"
                       value="{{ form.shop_id if form else '' }}"
                       class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-2 focus:ring-teal-400 focus:border-teal-400">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700">パスワード</label>
                <input type="password" name="password"
                       class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-2 focus:ring-teal-400 focus:border-teal-400">
            </div>

            <button type="submit"
                    class="w-full bg-teal-500 text-white py-2 rounded-md hover:bg-teal-600">
                ログイン
            </button>

        </form>

        <!-- 追加：ID/パスワード忘れ -->
        <div class="mt-4 text-center text-sm">
            <a href="/admin/forgot-id" class="text-teal-600 hover:underline mr-4">
                ログインIDを忘れた方
            </a>
            <a href="/admin/forgot-password" class="text-teal-600 hover:underline">
                パスワードを忘れた方
            </a>
        </div>

        <div class="mt-6 text-center">
            <a href="/signup" class="text-teal-600 hover:underline">
                新規店舗登録はこちら
            </a>
        </div>

    </div>
</div>

</body>
</html>
